name: Daily ingestion + classification

on:
  schedule:
    # Always 7am US Eastern, weekdays only. GitHub Actions cron is fixed
    # UTC and doesn't auto-adjust for daylight saving, so this is split
    # into two entries — one per UTC offset — rather than a single
    # year-round expression. Only one of the two ever matches on a given
    # day since the month ranges don't overlap.
    #
    # Approximated by calendar month, not the exact DST transition date
    # (2nd Sunday of March / 1st Sunday of November) — accurate to within
    # ~1-2 weeks around those two boundaries, off by exactly 1 hour during
    # that window. A reasonable tradeoff vs. exact date-based logic for a
    # job whose correctness never depends on the precise trigger time
    # (it's reading yesterday's close either way, hours before market open).
    - cron: "0 11 * 3-10 1-5"    # Mar-Oct (EDT, UTC-4) — 11:00 UTC = 7am EDT
    - cron: "0 12 * 11,12,1,2 1-5" # Nov-Feb (EST, UTC-5) — 12:00 UTC = 7am EST
  workflow_dispatch: {} # allows manual "Run workflow" from the Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ingestion
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ingestion/package-lock.json

      - run: npm ci

      - run: npm run ingest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          POLYMARKET_SLUGS: ${{ vars.POLYMARKET_SLUGS }}
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}

  classify:
    needs: ingest # only runs if ingest's required sources (FRED, EIA) succeeded
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rule_engine
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: rule_engine/package-lock.json

      - run: npm ci

      - run: npm run classify
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
